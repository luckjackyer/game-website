<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挂机游戏 - 开心小游戏</title>
    <meta name="description" content="免费在线挂机游戏，Cookie Master、Factory Tycoon、Dungeon Clicker等，挂机自动产出，轻松游戏！">
    <link rel="canonical" href="https://game-website.liuage20061111.workers.dev/idle-games.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .search-box {
            max-width: 600px;
            margin: 20px auto;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-box button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .game-icon {
            font-size: 60px;
            margin: 15px 0;
        }

        .game-card h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .game-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .play-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .game-card:hover .play-btn {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .game-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .game-card {
            position: relative;
        }

        .game-tag.new {
            background: #4ecdc4;
            color: white;
        }

        .game-tag.hot {
            background: #ff6b6b;
            color: white;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-top: 30px;
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px 0;
            margin-top: 50px;
            opacity: 0.8;
        }

        .game-count {
            text-align: center;
            color: white;
            font-size: 1.2em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 挂机游戏</h1>
            <p class="game-count">共 <span id="gameCount">3</span> 款游戏</p>
        </header>

        <div class="search-box">
            <input type="text" id="gameSearch" placeholder="搜索挂机游戏..." onkeyup="filterGames()">
            <button onclick="clearSearch()">✕</button>
        </div>

        <section class="games-grid" id="gamesGrid">
            <a href="games/cookie-master.html" class="game-card" data-tags="挂机,点击,饼干,自研">
                <div class="game-tag new">🆕新游戏</div>
                <div class="game-icon">🍪</div>
                <h2>Cookie Master</h2>
                <p>升级版饼干点击器，更多升级选项和成就系统！</p>
                <span class="play-btn">开始游戏</span>
            </a>

            <a href="games/factory-tycoon.html" class="game-card" data-tags="挂机,工厂,经营,自研">
                <div class="game-tag hot">🔥热门</div>
                <div class="game-icon">🏭</div>
                <h2>Factory Tycoon</h2>
                <p>管理工厂，建立生产链，成为工业大亨！</p>
                <span class="play-btn">开始游戏</span>
            </a>

            <a href="games/dungeon-clicker.html" class="game-card" data-tags="挂机,地牢,RPG,战斗,自研">
                <div class="game-tag new">🆕新游戏</div>
                <div class="game-icon">⚔️</div>
                <h2>Dungeon Clicker</h2>
                <p>RPG元素挂机游戏，击败敌人，收集装备！</p>
                <span class="play-btn">开始游戏</span>
            </a>
        </section>

        <div style="text-align: center;">
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>

        <footer>
            <p>&copy; 2026 开心小游戏 - 免费在线小游戏平台</p>
        </footer>
    </div>

    <script>
        function filterGames() {
            const search = document.getElementById('gameSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.game-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const title = card.querySelector('h2').textContent.toLowerCase();
                const desc = card.querySelector('p').textContent.toLowerCase();
                const tags = card.getAttribute('data-tags').toLowerCase();

                if (title.includes(search) || desc.includes(search) || tags.includes(search)) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            document.getElementById('gameCount').textContent = visibleCount;
        }

        function clearSearch() {
            document.getElementById('gameSearch').value = '';
            filterGames();
        }
    </script>
</body>
</html>
