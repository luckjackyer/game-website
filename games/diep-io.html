<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大作战 - 开心小游戏</title>
    <link rel="stylesheet" href="../css/game.css">
    <style>
        body {
            margin:0;
            padding:0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 3px solid #16213e;
            background: #0a0a1a;
            box-shadow: 0 0 30px rgba(22, 33, 62, 0.8);
            display: block;
            margin: 20px auto;
        }
        .info {
            color: #e94560;
            margin: 20px;
            font-size: 18px;
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e94560;
            text-decoration: none;
            font-size: 16px;
            z-index: 100;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← 返回首页</a>
    
    <div id="gameContainer">
        <h1 style="color: #e94560; margin: 20px 0;">🎯 坦克大作战</h1>
        <div class="info">
            <span>分数: <span id="score">0</span></span> | 
            <span>等级: <span id="level">1</span></span> | 
            <span>击杀: <span id="kills">0</span></span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = Math.min(1000, window.innerWidth - 40);
        canvas.height = Math.min(700, window.innerHeight - 150);
        
        let score = 0;
        let level = 1;
        let kills = 0;
        
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            speed: 3,
            angle: 0,
            color: '#00ff88',
            health: 100,
            maxHealth: 100
        };
        
        const bullets = [];
        const enemies = [];
        const particles = [];
        let mouseX = player.x;
        let mouseY = player.y;
        
        // 鼠标控制
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);
        });
        
        canvas.addEventListener('click', () => {
            shoot();
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
            player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            shoot();
        });
        
        function shoot() {
            bullets.push({
                x: player.x + Math.cos(player.angle) * player.radius,
                y: player.y + Math.sin(player.angle) * player.radius,
                dx: Math.cos(player.angle) * 8,
                dy: Math.sin(player.angle) * 8,
                radius: 5,
                damage: 10 + level * 2
            });
        }
        
        // 生成敌人
        function spawnEnemy() {
            const types = ['basic', 'fast', 'tank'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let speed, health, radius, color;
            switch(type) {
                case 'fast':
                    speed = 2.5;
                    health = 30;
                    radius = 15;
                    color = '#ff6b6b';
                    break;
                case 'tank':
                    speed = 1;
                    health = 100;
                    radius = 25;
                    color = '#4ecdc4';
                    break;
                default: // basic
                    speed = 1.5;
                    health = 50;
                    radius = 18;
                    color = '#ffe66d';
            }
            
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -50 : canvas.width + 50;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -50 : canvas.height + 50;
            }
            
            enemies.push({
                x: x,
                y: y,
                radius: radius,
                speed: speed,
                health: health,
                maxHealth: health,
                color: color,
                type: type,
                lastShot: 0
            });
        }
        
        // 生成粒子
        function spawnParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    dx: (Math.random() - 0.5) * 8,
                    dy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 3 + 1,
                    color: color,
                    life: 30
                });
            }
        }
        
        // 游戏循环
        function gameLoop() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // 玩家移动
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > player.radius + 10) {
                player.x += (dx / dist) * Math.min(player.speed, dist);
                player.y += (dy / dist) * Math.min(player.speed, dist);
            }
            
            // 边界检查
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            
            // 生成敌人
            if (enemies.length < 5 + level) {
                spawnEnemy();
            }
            
            // 更新子弹
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].dx;
                bullets[i].y += bullets[i].dy;
                
                if (bullets[i].x < 0 || bullets[i].x > canvas.width || 
                    bullets[i].y < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                // 绘制子弹
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(bullets[i].x, bullets[i].y, bullets[i].radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 更新敌人
            enemies.forEach((enemy, eIndex) => {
                // AI：朝向玩家移动
                const edx = player.x - enemy.x;
                const edy = player.y - enemy.y;
                const edist = Math.sqrt(edx * edx + edy * edy);
                
                if (edist > enemy.radius + player.radius + 20) {
                    enemy.x += (edx / edist) * enemy.speed;
                    enemy.y += (edy / edist) * enemy.speed;
                }
                
                // 敌人射击
                enemy.lastShot++;
                if (enemy.type === 'tank' && edist < 300 && enemy.lastShot > 60) {
                    bullets.push({
                        x: enemy.x,
                        y: enemy.y,
                        dx: (edx / edist) * 5,
                        dy: (edy / edist) * 5,
                        radius: 4,
                        damage: 5
                    });
                    enemy.lastShot = 0;
                }
                
                // 碰撞检测：子弹 vs 敌人
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const bdx = bullets[i].x - enemy.x;
                    const bdy = bullets[i].y - enemy.y;
                    const bdist = Math.sqrt(bdx * bdx + bdy * bdy);
                    
                    if (bdist < enemy.radius + bullets[i].radius && bullets[i].damage > 0) {
                        enemy.health -= bullets[i].damage;
                        spawnParticles(bullets[i].x, bullets[i].y, 5, '#ffff00');
                        bullets.splice(i, 1);
                        
                        if (enemy.health <= 0) {
                            spawnParticles(enemy.x, enemy.y, 20, enemy.color);
                            enemies.splice(eIndex, 1);
                            score += 10;
                            kills++;
                            document.getElementById('score').textContent = score;
                            document.getElementById('kills').textContent = kills;
                            
                            if (score >= level * 100) {
                                level++;
                                document.getElementById('level').textContent = level;
                            }
                        }
                        break;
                    }
                }
                
                // 碰撞检测：敌人 vs 玩家
                const pdx = player.x - enemy.x;
                const pdy = player.y - enemy.y;
                const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                
                if (pdist < player.radius + enemy.radius) {
                    player.health -= 1;
                    if (player.health <= 0) {
                        alert(`游戏结束！分数: ${score}，击杀: ${kills}`);
                        location.reload();
                        return;
                    }
                }
                
                // 绘制敌人
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 敌人血条
                ctx.fillStyle = '#f00';
                ctx.fillRect(enemy.x - enemy.radius, enemy.y - enemy.radius - 10, enemy.radius * 2, 5);
                ctx.fillStyle = '#0f0';
                ctx.fillRect(enemy.x - enemy.radius, enemy.y - enemy.radius - 10, enemy.radius * 2 * (enemy.health / enemy.maxHealth), 5);
            });
            
            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].dx;
                particles[i].y += particles[i].dy;
                particles[i].life--;
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.fillStyle = particles[i].color;
                ctx.beginPath();
                ctx.arc(particles[i].x, particles[i].y, particles[i].radius * (particles[i].life / 30), 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 绘制玩家
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 玩家炮管
            ctx.strokeStyle = player.color;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(
                player.x + Math.cos(player.angle) * player.radius * 1.5,
                player.y + Math.sin(player.angle) * player.radius * 1.5
            );
            ctx.stroke();
            
            // 玩家血条
            ctx.fillStyle = '#f00';
            ctx.fillRect(player.x - player.radius, player.y - player.radius - 10, player.radius * 2, 5);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(player.x - player.radius, player.y - player.radius - 10, player.radius * 2 * (player.health / player.maxHealth), 5);
            
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
