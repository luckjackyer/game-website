<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Tycoon - 工厂大亨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 1.8em;
            font-weight: bold;
        }

        .factory-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .factory {
            background: #f8f9fa;
            border: 3px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .factory h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .factory-icon {
            font-size: 60px;
            margin: 15px 0;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .buy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .buy-btn:hover {
            transform: scale(1.05);
        }

        .buy-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .upgrades {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .upgrade {
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upgrade:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .upgrade h4 {
            margin-bottom: 5px;
        }

        .upgrade p {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .cost {
            color: #f5576c;
            font-weight: bold;
            margin-top: 5px;
        }

        .save-status {
            text-align: center;
            margin-top: 20px;
            color: #28a745;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏭 Factory Tycoon</h1>
        
        <div class="stats">
            <div class="stat-box">
                <h3>Money</h3>
                <p id="money">$0</p>
            </div>
            <div class="stat-box">
                <h3>Income Per Second</h3>
                <p id="income">$0</p>
            </div>
            <div class="stat-box">
                <h3>Factories</h3>
                <p id="factories">0</p>
            </div>
            <div class="stat-box">
                <h3>Total Earned</h3>
                <p id="totalEarned">$0</p>
            </div>
        </div>

        <div class="factory-area" id="factoryArea"></div>

        <div class="upgrades" id="upgradesArea"></div>

        <div class="save-status" id="saveStatus"></div>
    </div>

    <script>
        let game = {
            money: 0,
            income: 0,
            factories: 0,
            totalEarned: 0,
            factoryLevels: {},
            upgrades: {}
        };

        const FACTORY_TYPES = [
            { id: 'clicker', name: 'Cookie Clicker', icon: '🍪', baseCost: 10, baseIncome: 1 },
            { id: 'farm', name: 'Farm', icon: '🌾', baseCost: 50, baseIncome: 5 },
            { id: 'mine', name: 'Mine', icon: '⛏️', baseCost: 200, baseIncome: 20 },
            { id: 'factory', name: 'Factory', icon: '🏭', baseCost: 1000, baseIncome: 100 },
            { id: 'bank', name: 'Bank', icon: '🏦', baseCost: 5000, baseIncome: 500 }
        ];

        const UPGRADES = [
            { id: 'speed', name: '⚡ Speed Boost', description: 'All factories produce 2x faster', cost: 1000 },
            { id: 'efficiency', name: '🔧 Efficiency', description: 'All factories produce 2x more', cost: 5000 },
            { id: 'automation', name: '🤖 Automation', description: 'Auto-buy basic factories', cost: 10000 }
        ];

        function init() {
            loadGame();
            renderFactories();
            renderUpgrades();
            updateDisplay();
            startGameLoop();
        }

        function renderFactories() {
            const area = document.getElementById('factoryArea');
            area.innerHTML = '';
            
            FACTORY_TYPES.forEach(type => {
                const factory = document.createElement('div');
                factory.className = 'factory';
                factory.innerHTML = `
                    <h3>${type.name}</h3>
                    <div class="factory-icon">${type.icon}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-${type.id}"></div>
                    </div>
                    <p>Level: <span id="level-${type.id}">0</span></p>
                    <p>Income: $<span id="income-${type.id}">0</span>/s</p>
                    <button class="buy-btn" onclick="buyFactory('${type.id}')">
                        Buy $<span id="cost-${type.id}">0</span>
                    </button>
                `;
                area.appendChild(factory);
            });
        }

        function renderUpgrades() {
            const area = document.getElementById('upgradesArea');
            area.innerHTML = '';
            
            UPGRADES.forEach(upgrade => {
                const div = document.createElement('div');
                div.className = 'upgrade';
                div.innerHTML = `
                    <h4>${upgrade.name}</h4>
                    <p>${upgrade.description}</p>
                    <div class="cost">Cost: $${formatNumber(upgrade.cost)}</div>
                `;
                div.onclick = () => buyUpgrade(upgrade.id);
                area.appendChild(div);
            });
        }

        function buyFactory(typeId) {
            const type = FACTORY_TYPES.find(t => t.id === typeId);
            const level = game.factoryLevels[typeId] || 0;
            const cost = Math.floor(type.baseCost * Math.pow(1.5, level));
            
            if (game.money >= cost) {
                game.money -= cost;
                game.factoryLevels[typeId] = level + 1;
                game.factories++;
                game.income = calculateIncome();
                updateDisplay();
                showSaveStatus(`${type.name} upgraded to level ${level + 1}!`);
            }
        }

        function buyUpgrade(upgradeId) {
            const upgrade = UPGRADES.find(u => u.id === upgradeId);
            if (game.money >= upgrade.cost && !game.upgrades[upgradeId]) {
                game.money -= upgrade.cost;
                game.upgrades[upgradeId] = true;
                game.income = calculateIncome();
                updateDisplay();
                showSaveStatus(`Upgrade purchased: ${upgrade.name}!`);
            }
        }

        function calculateIncome() {
            let income = 0;
            FACTORY_TYPES.forEach(type => {
                const level = game.factoryLevels[type.id] || 0;
                let typeIncome = type.baseIncome * level;
                
                // Apply upgrades
                if (game.upgrades.efficiency) typeIncome *= 2;
                
                income += typeIncome;
            });
            
            // Apply speed upgrade
            if (game.upgrades.speed) income *= 2;
            
            return income;
        }

        function updateDisplay() {
            document.getElementById('money').textContent = '$' + formatNumber(game.money);
            document.getElementById('income').textContent = '$' + formatNumber(game.income);
            document.getElementById('factories').textContent = game.factories;
            document.getElementById('totalEarned').textContent = '$' + formatNumber(game.totalEarned);
            
            // Update factory displays
            FACTORY_TYPES.forEach(type => {
                const level = game.factoryLevels[type.id] || 0;
                const cost = Math.floor(type.baseCost * Math.pow(1.5, level));
                const income = type.baseIncome * level * (game.upgrades.efficiency ? 2 : 1);
                
                document.getElementById(`level-${type.id}`).textContent = level;
                document.getElementById(`income-${type.id}`).textContent = formatNumber(income * (game.upgrades.speed ? 2 : 1));
                document.getElementById(`cost-${type.id}`).textContent = formatNumber(cost);
                
                // Update button state
                const btn = document.querySelector(`#factoryArea .factory:nth-child(${FACTORY_TYPES.indexOf(type) + 1}) .buy-btn`);
                if (btn) btn.disabled = game.money < cost;
            });
        }

        function startGameLoop() {
            setInterval(() => {
                game.money += game.income;
                game.totalEarned += game.income;
                updateDisplay();
            }, 1000);

            // Auto-save every 30 seconds
            setInterval(() => {
                saveGame();
            }, 30000);
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return Math.floor(num).toString();
        }

        function saveGame() {
            localStorage.setItem('factoryTycoon', JSON.stringify(game));
            showSaveStatus('Game saved!');
        }

        function loadGame() {
            const saved = localStorage.getItem('factoryTycoon');
            if (saved) {
                game = JSON.parse(saved);
                showSaveStatus('Game loaded!');
            }
        }

        function showSaveStatus(msg) {
            const status = document.getElementById('saveStatus');
            status.textContent = msg;
            setTimeout(() => {
                status.textContent = '';
            }, 2000);
        }

        // Initialize game
        init();
    </script>
</body>
</html>
