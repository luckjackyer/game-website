<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 开心小游戏</title>
    <link rel="stylesheet" href="../css/game.css">
    <style>
        body {
            margin:0;
            padding:0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        h1 {
            color: #e94560;
            margin: 0;
        }
        .scores {
            display: flex;
            gap: 20px;
        }
        .score-box {
            background: #16213e;
            padding: 10px 20px;
            border-radius: 5px;
            color: #fff;
        }
        .score-box .label {
            font-size: 12px;
            color: #888;
        }
        .score-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }
        #gameBoard {
            background: #16213e;
            border-radius: 5px;
            padding: 10px;
            display: inline-block;
            box-shadow: 0 0 30px rgba(22, 33, 62, 0.8);
        }
        .row {
            display: flex;
        }
        .cell {
            width: 80px;
            height: 80px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            transition: all 0.15s ease;
        }
        .cell-2 { background: #eee4da; color: #776e65; }
        .cell-4 { background: #ede0c8; color: #776e65; }
        .cell-8 { background: #f2b179; color: #f9f6f2; }
        .cell-16 { background: #f59563; color: #f9f6f2; }
        .cell-32 { background: #f67c5f; color: #f9f6f2; }
        .cell-64 { background: #f65e3b; color: #f9f6f2; }
        .cell-128 { background: #edcf72; color: #f9f6f2; font-size: 20px; }
        .cell-256 { background: #edcc61; color: #f9f6f2; font-size: 20px; }
        .cell-512 { background: #edc850; color: #f9f6f2; font-size: 20px; }
        .cell-1024 { background: #edc53f; color: #f9f6f2; font-size: 16px; }
        .cell-2048 { background: #edc22e; color: #f9f6f2; font-size: 16px; }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e94560;
            text-decoration: none;
            font-size: 16px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .instructions {
            color: #888;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← 返回首页</a>
    
    <div id="gameContainer">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="label">分数</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
        </div>
        
        <div id="gameBoard"></div>
        
        <div class="instructions">
            📱 使用方向键或WASD移动方块 | 🎮 移动端支持滑动操作
        </div>
    </div>

    <script>
        let board = Array(4).fill().map(() => Array(4).fill(0));
        let score = 0;
        let best = localStorage.getItem('2048best') || 0;
        document.getElementById('best').textContent = best;
        
        // 初始化游戏
        function initGame() {
            addRandomTile();
            addRandomTile();
            renderBoard();
        }
        
        // 添加随机方块
        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) {
                        emptyCells.push({row: i, col: j});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const {row, col} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[row][col] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        // 渲染棋盘
        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[i][j] ? ` cell-${board[i][j]}` : '');
                    cell.textContent = board[i][j] || '';
                    row.appendChild(cell);
                }
                gameBoard.appendChild(row);
            }
        }
        
        // 移动棋盘
        function move(direction) {
            let moved = false;
            const oldBoard = board.map(row => [...row]);
            
            if (direction === 'left') {
                for (let i = 0; i < 4; i++) {
                    let row = board[i].filter(val => val !== 0);
                    for (let j = 0; j < row.length - 1; j++) {
                        if (row[j] === row[j + 1]) {
                            row[j] *= 2;
                            score += row[j];
                            row.splice(j + 1, 1);
                        }
                    }
                    while (row.length < 4) row.push(0);
                    board[i] = row;
                }
            } else if (direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    let row = board[i].filter(val => val !== 0);
                    for (let j = row.length - 1; j > 0; j--) {
                        if (row[j] === row[j - 1]) {
                            row[j] *= 2;
                            score += row[j];
                            row.splice(j - 1, 1);
                            j--;
                        }
                    }
                    while (row.length < 4) row.unshift(0);
                    board[i] = row;
                }
            } else if (direction === 'up') {
                for (let j = 0; j < 4; j++) {
                    let col = [];
                    for (let i = 0; i < 4; i++) col.push(board[i][j]);
                    col = col.filter(val => val !== 0);
                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i + 1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i + 1, 1);
                            i--;
                        }
                    }
                    while (col.length < 4) col.push(0);
                    for (let i = 0; i < 4; i++) board[i][j] = col[i];
                }
            } else if (direction === 'down') {
                for (let j = 0; j < 4; j++) {
                    let col = [];
                    for (let i = 0; i < 4; i++) col.push(board[i][j]);
                    col = col.filter(val => val !== 0);
                    for (let i = col.length - 1; i > 0; i--) {
                        if (col[i] === col[i - 1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i - 1, 1);
                            i--;
                        }
                    }
                    while (col.length < 4) col.unshift(0);
                    for (let i = 0; i < 4; i++) board[i][j] = col[i];
                }
            }
            
            // 检查是否有移动
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (oldBoard[i][j] !== board[i][j]) {
                        moved = true;
                        break;
                    }
                }
                if (moved) break;
            }
            
            if (moved) {
                addRandomTile();
                score = score;
                document.getElementById('score').textContent = score;
                if (score > best) {
                    best = score;
                    localStorage.setItem('2048best', best);
                    document.getElementById('best').textContent = best;
                }
                renderBoard();
                
                // 检查游戏是否结束
                if (isGameOver()) {
                    setTimeout(() => alert(`游戏结束！分数: ${score}`), 300);
                }
            }
        }
        
        // 检查游戏是否结束
        function isGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) return false;
                    if (j < 3 && board[i][j] === board[i][j + 1]) return false;
                    if (i < 3 && board[i][j] === board[i + 1][j]) return false;
                }
            }
            return true;
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                e.preventDefault();
                move('left');
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                e.preventDefault();
                move('right');
            } else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                e.preventDefault();
                move('up');
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                e.preventDefault();
                move('down');
            }
        });
        
        // 触摸控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) move('right');
                else move('left');
            } else {
                if (dy > 0) move('down');
                else move('up');
            }
        });
        
        initGame();
    </script>
</body>
</html>
