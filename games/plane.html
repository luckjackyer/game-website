<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>飞机大战 - 开心小游戏</title>
    <meta name="description" content="经典飞行射击游戏，躲避子弹，击落敌机，挑战最高分">
    <link rel="canonical" href="https://your-domain.com/games/plane.html">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/game.css">
    <script src="../js/game-utils.js"></script>
    <style>
        .game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            background: #000;
            margin: 20px 0;
        }
        
        #gameCanvas {
            border: 2px solid #667eea;
            background: #111;
            max-width: 100%;
            height: auto;
        }
        
        .game-info {
            text-align: center;
            color: white;
            padding: 20px;
            background: rgba(0,0,0,0.8);
        }
        
        .score {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.9em;
        }
        
        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="../index.html" class="back-btn">← 返回首页</a>
            <h1>✈️ 飞机大战</h1>
            <p class="slogan">躲避子弹，击落敌机，挑战最高分！</p>
        </div>
    </header>

    <div class="game-info">
        <div class="score">得分: <span id="score">0</span> | 最高分: <span id="highScore">0</span></div>
        <div class="controls">鼠标移动控制飞机 | 点击发射子弹 | 空格键发射子弹</div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 开心小游戏 - 免费在线小游戏平台</p>
        </div>
    </footer>

    <!-- 音效控制按钮 -->
    <button class="sound-toggle" id="soundToggle">🔊</button>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2>游戏结束!</h2>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <div class="final-score">最高分: <span id="finalHighScore">0</span></div>
            <input type="text" id="playerName" placeholder="输入你的名字" maxlength="10" value="玩家">
            <div>
                <button id="saveScore">保存分数</button>
                <button id="restartGame">再玩一次</button>
            </div>
        </div>
    </div>

    <!-- 排行榜区域 -->
    <div class="leaderboard-section">
        <div id="leaderboard"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');
        const finalHighScoreElement = document.getElementById('finalHighScore');
        const gameOverModal = document.getElementById('gameOverModal');
        const playerNameInput = document.getElementById('playerName');
        const saveScoreButton = document.getElementById('saveScore');
        const restartGameButton = document.getElementById('restartGame');
        const soundToggleButton = document.getElementById('soundToggle');

        // 初始化音效和排行榜
        const soundManager = new SoundManager();
        const leaderboard = new Leaderboard('plane');
        
        // 游戏状态
        let score = 0;
        let gameOver = false;
        let animationId = null;

        // 玩家飞机
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 80,
            width: 50,
            height: 50,
            speed: 8,
            color: '#00ff00'
        };

        // 子弹数组
        let bullets = [];
        const bulletSpeed = 10;
        const bulletWidth = 4;
        const bulletHeight = 15;

        // 敌机数组
        let enemies = [];
        let enemySpeed = 2;
        let enemySpawnRate = 60;
        let frameCount = 0;

        // 敌机子弹数组
        let enemyBullets = [];
        const enemyBulletSpeed = 5;

        // 触摸/鼠标位置
        let touchX = player.x + player.width / 2;
        let isTouching = false;

        // 绘制玩家飞机
        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            // 飞机尾焰效果
            ctx.fillStyle = '#ff6600';
            ctx.fillRect(player.x + player.width / 2 - 3, player.y + player.height, 6, 15);
        }

        // 绘制子弹
        function drawBullets() {
            ctx.fillStyle = '#ffff00';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bulletWidth, bulletHeight);
            });
        }

        // 绘制敌机
        function drawEnemies() {
            ctx.fillStyle = '#ff0000';
            enemies.forEach(enemy => {
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
                ctx.lineTo(enemy.x, enemy.y);
                ctx.lineTo(enemy.x + enemy.width, enemy.y);
                ctx.closePath();
                ctx.fill();
            });
        }

        // 绘制敌机子弹
        function drawEnemyBullets() {
            ctx.fillStyle = '#ff00ff';
            enemyBullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 更新子弹位置
        function updateBullets() {
            bullets = bullets.filter(bullet => {
                bullet.y -= bulletSpeed;
                return bullet.y > 0;
            });
        }

        // 更新敌机位置
        function updateEnemies() {
            enemies = enemies.filter(enemy => {
                enemy.y += enemySpeed;
                
                // 敌机随机发射子弹
                if (Math.random() < 0.01) {
                    enemyBullets.push({
                        x: enemy.x + enemy.width / 2,
                        y: enemy.y + enemy.height
                    });
                }
                
                return enemy.y < canvas.height;
            });
        }

        // 更新敌机子弹位置
        function updateEnemyBullets() {
            enemyBullets = enemyBullets.filter(bullet => {
                bullet.y += enemyBulletSpeed;
                return bullet.y < canvas.height;
            });
        }

        // 生成敌机
        function spawnEnemy() {
            if (frameCount % enemySpawnRate === 0) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -40,
                    width: 40,
                    height: 40
                });
            }
        }

        // 碰撞检测
        function checkCollisions() {
            // 子弹与敌机碰撞
            bullets = bullets.filter(bullet => {
                let hit = false;
                enemies = enemies.filter(enemy => {
                    if (bullet.x < enemy.x + enemy.width &&
                        bullet.x + bulletWidth > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bulletHeight > enemy.y) {
                        hit = true;
                        score += 10;
                        scoreElement.textContent = score;
                        soundManager.play('hit');
                        return false;
                    }
                    return true;
                });
                return !hit;
            });

            // 敌机子弹与玩家碰撞
            enemyBullets = enemyBullets.filter(bullet => {
                if (bullet.x > player.x &&
                    bullet.x < player.x + player.width &&
                    bullet.y > player.y &&
                    bullet.y < player.y + player.height) {
                    gameOver = true;
                    soundManager.play('lose');
                    return false;
                }
                return true;
            });

            // 敌机与玩家碰撞
            enemies = enemies.filter(enemy => {
                if (player.x < enemy.x + enemy.width &&
                    player.x + player.width > enemy.x &&
                    player.y < enemy.y + enemy.height &&
                    player.y + player.height > enemy.y) {
                    gameOver = true;
                    soundManager.play('lose');
                    return false;
                }
                return true;
            });
        }

        // 游戏循环
        function gameLoop() {
            if (gameOver) {
                // 显示游戏结束弹窗
                finalScoreElement.textContent = score;
                finalHighScoreElement.textContent = leaderboard.getHighScore();
                gameOverModal.classList.add('active');
                return;
            }

            // 清空画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星空背景
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 37) % canvas.width;
                const y = (i * 23 + frameCount) % canvas.height;
                ctx.fillRect(x, y, 1, 1);
            }

            // 更新游戏状态
            if (isTouching) {
                const targetX = touchX - player.width / 2;
                if (Math.abs(targetX - player.x) > player.speed) {
                    player.x += targetX > player.x ? player.speed : -player.speed;
                }
            }

            updateBullets();
            updateEnemies();
            updateEnemyBullets();
            spawnEnemy();
            checkCollisions();

            // 绘制游戏元素
            drawEnemies();
            drawEnemyBullets();
            drawBullets();
            drawPlayer();

            frameCount++;
            
            // 难度递增
            if (frameCount % 1000 === 0) {
                enemySpeed += 0.5;
                if (enemySpawnRate > 20) enemySpawnRate -= 5;
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // 发射子弹
        function shoot() {
            if (!gameOver) {
                bullets.push({
                    x: player.x + player.width / 2 - bulletWidth / 2,
                    y: player.y
                });
                soundManager.play('shoot');
            }
        }

        // 重新开始游戏
        function restartGame() {
            score = 0;
            gameOver = false;
            bullets = [];
            enemies = [];
            enemyBullets = [];
            frameCount = 0;
            enemySpeed = 2;
            enemySpawnRate = 60;
            player.x = canvas.width / 2 - 25;
            scoreElement.textContent = score;
            gameOverModal.classList.remove('active');
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            gameLoop();
        }

        // 保存分数
        function saveScore() {
            const playerName = playerNameInput.value.trim() || '玩家';
            leaderboard.addScore(score, playerName);
            leaderboard.showLeaderboard('leaderboard');
            gameOverModal.classList.remove('active');
        }

        // 事件监听
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            touchX = e.clientX - rect.left;
        });

        canvas.addEventListener('click', () => {
            if (!gameOver) {
                shoot();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isTouching = true;
            const rect = canvas.getBoundingClientRect();
            touchX = e.touches[0].clientX - rect.left;
            if (!gameOver) {
                shoot();
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = e.touches[0].clientX - rect.left;
        });

        canvas.addEventListener('touchend', () => {
            isTouching = false;
        });

        // 键盘控制（PC端）
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.code === 'Space') {
                e.preventDefault();
                shoot();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function handleKeyboard() {
            if (keys['ArrowLeft'] || keys['a']) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] || keys['d']) {
                player.x += player.speed;
            }
            if (keys['ArrowUp'] || keys['w']) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] || keys['s']) {
                player.y += player.speed;
            }
            
            // 限制玩家在画布内
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
        }

        // 修改游戏循环以包含键盘控制
        const originalGameLoop = gameLoop;
        gameLoop = function() {
            if (gameOver) {
                finalScoreElement.textContent = score;
                finalHighScoreElement.textContent = leaderboard.getHighScore();
                gameOverModal.classList.add('active');
                return;
            }

            // 清空画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星空背景
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 37) % canvas.width;
                const y = (i * 23 + frameCount) % canvas.height;
                ctx.fillRect(x, y, 1, 1);
            }

            // 更新游戏状态
            handleKeyboard();
            if (isTouching) {
                const targetX = touchX - player.width / 2;
                if (Math.abs(targetX - player.x) > player.speed) {
                    player.x += targetX > player.x ? player.speed : -player.speed;
                }
            }

            updateBullets();
            updateEnemies();
            updateEnemyBullets();
            spawnEnemy();
            checkCollisions();

            // 绘制游戏元素
            drawEnemies();
            drawEnemyBullets();
            drawBullets();
            drawPlayer();

            frameCount++;
            
            // 难度递增
            if (frameCount % 1000 === 0) {
                enemySpeed += 0.5;
                if (enemySpawnRate > 20) enemySpawnRate -= 5;
            }

            animationId = requestAnimationFrame(gameLoop);
        };

        // 按钮事件监听
        saveScoreButton.addEventListener('click', saveScore);
        restartGameButton.addEventListener('click', restartGame);
        
        soundToggleButton.addEventListener('click', () => {
            const enabled = soundManager.toggle();
            soundToggleButton.textContent = enabled ? '🔊' : '🔇';
        });

        // 显示最高分和排行榜
        highScoreElement.textContent = leaderboard.getHighScore();
        leaderboard.showLeaderboard('leaderboard');

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
