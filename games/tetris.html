<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>俄罗斯方块 - 开心小游戏</title>
    <meta name="description" content="经典俄罗斯方块游戏，旋转方块，消除行数，挑战最高分">
    <link rel="canonical" href="https://your-domain.com/games/tetris.html">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/game.css">
    <script src="../js/game-utils.js"></script>
    <style>
        .game-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            min-height: 80vh;
            background: #1a1a2e;
            margin: 20px 0;
            padding: 20px;
        }
        
        #gameCanvas {
            border: 2px solid #667eea;
            background: #16213e;
        }
        
        .game-sidebar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            min-width: 200px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .game-info {
            text-align: center;
            color: white;
            padding: 20px;
            background: rgba(0,0,0,0.8);
        }
        
        .score {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.9em;
        }
        
        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .next-piece {
            margin: 20px 0;
            text-align: center;
        }

        .next-piece h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        #nextCanvas {
            border: 2px solid #667eea;
            background: #16213e;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="../index.html" class="back-btn">← 返回首页</a>
            <h1>🎲 俄罗斯方块</h1>
            <p class="slogan">旋转方块，消除行数，挑战最高分！</p>
        </div>
    </header>

    <div class="game-info">
        <div class="score">得分: <span id="score">0</span> | 等级: <span id="level">1</span> | 最高分: <span id="highScore">0</span></div>
        <div class="controls">方向键控制移动和旋转 | 空格键快速下落</div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        
        <div class="game-sidebar">
            <div class="next-piece">
                <h3>下一个</h3>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            
            <div class="game-stats">
                <h3>游戏说明</h3>
                <ul style="margin-top: 10px; padding-left: 20px; line-height: 1.8;">
                    <li>← → 移动方块</li>
                    <li>↑ 旋转方块</li>
                    <li>↓ 加速下落</li>
                    <li>空格 快速下落</li>
                    <li>消除行数获得分数</li>
                    <li>一次消除多行有奖励</li>
                </ul>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 开心小游戏 - 免费在线小游戏平台</p>
        </div>
    </footer>

    <!-- 音效控制按钮 -->
    <button class="sound-toggle" id="soundToggle">🔊</button>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2>游戏结束!</h2>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <div class="final-score">最高分: <span id="finalHighScore">0</span></div>
            <input type="text" id="playerName" placeholder="输入你的名字" maxlength="10" value="玩家">
            <div>
                <button id="saveScore">保存分数</button>
                <button id="restartGame">再玩一次</button>
            </div>
        </div>
    </div>

    <!-- 排行榜区域 -->
    <div class="leaderboard-section">
        <div id="leaderboard"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');
        const finalHighScoreElement = document.getElementById('finalHighScore');
        const gameOverModal = document.getElementById('gameOverModal');
        const playerNameInput = document.getElementById('playerName');
        const saveScoreButton = document.getElementById('saveScore');
        const restartGameButton = document.getElementById('restartGame');
        const soundToggleButton = document.getElementById('soundToggle');

        // 初始化音效和排行榜
        const soundManager = new SoundManager();
        const leaderboard = new Leaderboard('tetris');

        // 游戏配置
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        // 方块形状
        const SHAPES = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[1,1,1],[0,1,0]], // T
            [[1,1,1],[1,0,0]], // L
            [[1,1,1],[0,0,1]], // J
            [[1,1,0],[0,1,1]], // S
            [[0,1,1],[1,1,0]]  // Z
        ];

        const COLORS = ['#00f0f0', '#f0f000', '#a000f0', '#f0a000', '#0000f0', '#00f000', '#f00000'];

        // 游戏状态
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameOver = false;
        let animationId = null;
        let dropInterval = 1000;
        let dropCounter = 0;
        let lastTime = 0;

        // 当前方块
        let piece = {
            x: 0,
            y: 0,
            shape: null,
            color: null
        };

        // 下一个方块
        let nextPiece = null;

        // 游戏板
        let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));

        // 绘制方块
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
            
            // 高光效果
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, 3);
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, 3, BLOCK_SIZE - 1);
        }

        // 绘制游戏板
        function drawBoard() {
            board.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        drawBlock(ctx, x, y, COLORS[value - 1]);
                    }
                });
            });
        }

        // 绘制当前方块
        function drawPiece() {
            piece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        drawBlock(ctx, piece.x + x, piece.y + y, piece.color);
                    }
                });
            });
        }

        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.fillStyle = '#16213e';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (!nextPiece) return;
            
            const offsetX = (nextCanvas.width / BLOCK_SIZE - nextPiece.shape[0].length) / 2;
            const offsetY = (nextCanvas.height / BLOCK_SIZE - nextPiece.shape.length) / 2;
            
            nextPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.fillRect((offsetX + x) * BLOCK_SIZE, (offsetY + y) * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    }
                });
            });
        }

        // 碰撞检测
        function collide() {
            return piece.shape.some((row, y) => {
                return row.some((value, x) => {
                    return value && (board[y + piece.y + 1] && board[y + piece.y + 1][x + piece.x]) || 
                           y + piece.y + 1 >= ROWS ||
                           x + piece.x < 0 ||
                           x + piece.x >= COLS;
                });
            });
        }

        // 移动方块
        function movePiece(dx, dy) {
            piece.x += dx;
            piece.y += dy;
            
            if (collide()) {
                piece.x -= dx;
                piece.y -= dy;
                return false;
            }
            return true;
        }

        // 旋转方块
        function rotatePiece() {
            const rotated = piece.shape[0].map((_, i) => 
                piece.shape.map(row => row[i]).reverse()
            );
            
            const originalShape = piece.shape;
            piece.shape = rotated;
            
            if (collide()) {
                piece.shape = originalShape;
                return false;
            }
            soundManager.play('bounce');
            return true;
        }

        // 固定方块到游戏板
        function mergePiece() {
            piece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        board[y + piece.y][x + piece.x] = COLORS.indexOf(piece.color) + 1;
                    }
                });
            });
        }

        // 清除完整的行
        function clearLines() {
            let linesCleared = 0;
            
            board = board.filter(row => {
                if (row.every(cell => cell !== 0)) {
                    linesCleared++;
                    return false;
                }
                return true;
            });
            
            while (board.length < ROWS) {
                board.unshift(Array(COLS).fill(0));
            }
            
            if (linesCleared > 0) {
                // 计分
                const linePoints = [0, 100, 300, 500, 800];
                score += linePoints[linesCleared] * level;
                lines += linesCleared;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                
                scoreElement.textContent = score;
                levelElement.textContent = level;
                soundManager.play('score');
            }
        }

        // 生成新方块
        function newPiece() {
            if (!nextPiece) {
                const shapeIndex = Math.floor(Math.random() * SHAPES.length);
                nextPiece = {
                    shape: SHAPES[shapeIndex],
                    color: COLORS[shapeIndex]
                };
            }
            
            piece.x = Math.floor(COLS / 2) - Math.floor(nextPiece.shape[0].length / 2);
            piece.y = 0;
            piece.shape = nextPiece.shape;
            piece.color = nextPiece.color;
            
            const shapeIndex = Math.floor(Math.random() * SHAPES.length);
            nextPiece = {
                shape: SHAPES[shapeIndex],
                color: COLORS[shapeIndex]
            };
            
            drawNextPiece();
            
            if (collide()) {
                gameOver = true;
                soundManager.play('lose');
            }
        }

        // 游戏循环
        function gameLoop(time = 0) {
            if (gameOver) {
                finalScoreElement.textContent = score;
                finalHighScoreElement.textContent = leaderboard.getHighScore();
                gameOverModal.classList.add('active');
                return;
            }

            const deltaTime = time - lastTime;
            lastTime = time;
            
            dropCounter += deltaTime;
            
            if (dropCounter > dropInterval) {
                movePiece(0, 1);
                dropCounter = 0;
            }

            // 清空画布
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                }
            }
            
            drawBoard();
            drawPiece();

            animationId = requestAnimationFrame(gameLoop);
        }

        // 重新开始游戏
        function restartGame() {
            score = 0;
            level = 1;
            lines = 0;
            gameOver = false;
            dropInterval = 1000;
            board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
            scoreElement.textContent = score;
            levelElement.textContent = level;
            gameOverModal.classList.remove('active');
            newPiece();
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            lastTime = 0;
            dropCounter = 0;
            gameLoop();
        }

        // 保存分数
        function saveScore() {
            const playerName = playerNameInput.value.trim() || '玩家';
            leaderboard.addScore(score, playerName);
            leaderboard.showLeaderboard('leaderboard');
            gameOverModal.classList.remove('active');
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (gameOver) {
                if (e.code === 'Space') {
                    restartGame();
                }
                return;
            }
            
            switch (e.code) {
                case 'ArrowLeft':
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    if (movePiece(0, 1)) {
                        score += 1;
                        scoreElement.textContent = score;
                    }
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    break;
                case 'Space':
                    e.preventDefault();
                    while (movePiece(0, 1)) {
                        score += 2;
                    }
                    mergePiece();
                    clearLines();
                    newPiece();
                    scoreElement.textContent = score;
                    soundManager.play('hit');
                    break;
            }
        });

        // 按钮事件监听
        saveScoreButton.addEventListener('click', saveScore);
        restartGameButton.addEventListener('click', restartGame);
        
        soundToggleButton.addEventListener('click', () => {
            const enabled = soundManager.toggle();
            soundToggleButton.textContent = enabled ? '🔊' : '🔇';
        });

        // 显示最高分和排行榜
        highScoreElement.textContent = leaderboard.getHighScore();
        leaderboard.showLeaderboard('leaderboard');

        // 启动游戏
        newPiece();
        gameLoop();
    </script>
</body>
</html>
