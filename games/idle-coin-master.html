<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金币大师 - 挂机游戏 | 免费在线玩</title>
    <meta name="description" content="玩金币大师挂机游戏，点击获得金币，购买自动发生器，轻松挂机升级！">
    <link rel="stylesheet" href="../css/game.css">
    <style>
        #gameContainer {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        #coinDisplay {
            font-size: 48px;
            font-weight: bold;
            color: #f39c12;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        #coinButton {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%);
            border: 5px solid #fff;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
            transition: transform 0.1s;
            margin: 20px;
        }
        #coinButton:hover {
            transform: scale(1.05);
        }
        #coinButton:active {
            transform: scale(0.95);
        }
        .shop {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .shop-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .shop-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .shop-item.owned {
            background: #2ecc71;
            color: white;
        }
        .shop-item-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .shop-item-cost {
            font-size: 16px;
            color: #e74c3c;
            font-weight: bold;
        }
        .shop-item.owned .shop-item-cost {
            color: white;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        #achievements {
            margin: 30px 0;
            text-align: left;
        }
        .achievement {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            display: none;
        }
        .achievement.unlocked {
            display: block;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #ecf0f1;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>💰 金币大师</h1>
        <p>点击金币获得财富，购买发生器自动产金！</p>
        
        <div id="coinDisplay">💰 0 金币</div>
        
        <button id="coinButton" onclick="clickCoin()">
            💰<br>点击！
        </button>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%">下一级: 100</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="coinsPerSecond">0</div>
                <div class="stat-label">每秒产出</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalClicks">0</div>
                <div class="stat-label">总点击数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="playTime">0:00</div>
                <div class="stat-label">游戏时长</div>
            </div>
        </div>
        
        <h2>🏪 商店</h2>
        <div class="shop" id="shop"></div>
        
        <div id="achievements">
            <h2>🏆 成就</h2>
            <div class="achievement" id="ach1">
                <strong>🎯 初学者</strong>: 获得100金币
            </div>
            <div class="achievement" id="ach2">
                <strong>💎 百万富翁</strong>: 获得1,000,000金币
            </div>
            <div class="achievement" id="ach3">
                <strong>🔫 点击大师</strong>: 点击1000次
            </div>
        </div>
        
        <button onclick="saveGame()" style="padding: 10px 20px; margin: 10px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">💾 保存进度</button>
        <button onclick="loadGame()" style="padding: 10px 20px; margin: 10px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer;">📂 读取进度</button>
        <button onclick="resetGame()" style="padding: 10px 20px; margin: 10px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;">🗑️ 重置游戏</button>
    </div>
    
    <script>
        // 游戏状态
        let gameState = {
            coins: 0,
            totalCoins: 0,
            clicks: 0,
            coinsPerClick: 1,
            coinsPerSecond: 0,
            playTime: 0,
            lastSave: Date.now(),
            generators: {},
            upgrades: {},
            achievements: []
        };
        
        // 发生器配置
        const generators = [
            { id: 'cursor', name: '🖱️ 光标', baseCost: 10, coinsPerSecond: 1, costMultiplier: 1.15 },
            { id: 'helper', name: '👦 帮手', baseCost: 50, coinsPerSecond: 5, costMultiplier: 1.15 },
            { id: 'farm', name: '🌾 农场', baseCost: 200, coinsPerSecond: 20, costMultiplier: 1.15 },
            { id: 'mine', name: '⛏️ 矿场', baseCost: 1000, coinsPerSecond: 100, costMultiplier: 1.15 },
            { id: 'factory', name: '🏭 工厂', baseCost: 5000, coinsPerSecond: 500, costMultiplier: 1.15 },
            { id: 'bank', name: '🏦 银行', baseCost: 20000, coinsPerSecond: 2000, costMultiplier: 1.15 },
            { id: 'temple', name: '🏯 神殿', baseCost: 100000, coinsPerSecond: 10000, costMultiplier: 1.15 },
            { id: 'wizard', name: '🧙 巫师', baseCost: 500000, coinsPerSecond: 50000, costMultiplier: 1.15 }
        ];
        
        // 点击金币
        function clickCoin() {
            gameState.coins += gameState.coinsPerClick;
            gameState.totalCoins += gameState.coinsPerClick;
            gameState.clicks++;
            updateDisplay();
            checkAchievements();
            
            // 点击动画
            const btn = document.getElementById('coinButton');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 100);
        }
        
        // 购买发生器
        function buyGenerator(id) {
            const gen = generators.find(g => g.id === id);
            const count = gameState.generators[id] || 0;
            const cost = Math.floor(gen.baseCost * Math.pow(gen.costMultiplier, count));
            
            if (gameState.coins >= cost) {
                gameState.coins -= cost;
                gameState.generators[id] = (gameState.generators[id] || 0) + 1;
                updateCoinsPerSecond();
                updateDisplay();
                renderShop();
                checkAchievements();
            }
        }
        
        // 更新每秒产出
        function updateCoinsPerSecond() {
            gameState.coinsPerSecond = 0;
            generators.forEach(gen => {
                const count = gameState.generators[gen.id] || 0;
                gameState.coinsPerSecond += gen.coinsPerSecond * count;
            });
        }
        
        // 游戏循环
        function gameLoop() {
            if (gameState.coinsPerSecond > 0) {
                gameState.coins += gameState.coinsPerSecond / 10;
                gameState.totalCoins += gameState.coinsPerSecond / 10;
            }
            gameState.playTime += 100;
            updateDisplay();
            checkAchievements();
        }
        
        // 更新显示
        function updateDisplay() {
            document.getElementById('coinDisplay').innerHTML = `💰 ${formatNumber(Math.floor(gameState.coins))} 金币`;
            document.getElementById('coinsPerSecond').textContent = formatNumber(gameState.coinsPerSecond);
            document.getElementById('totalClicks').textContent = formatNumber(gameState.clicks);
            document.getElementById('playTime').textContent = formatTime(gameState.playTime);
            
            // 进度条
            const level = Math.floor(gameState.totalCoins / 100) + 1;
            const needed = level * 100;
            const progress = ((gameState.totalCoins % 100) / 100) * 100;
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = progress + '%';
            progressBar.textContent = `下一级: ${formatNumber(needed)}`;
        }
        
        // 渲染商店
        function renderShop() {
            const shop = document.getElementById('shop');
            shop.innerHTML = '';
            
            generators.forEach(gen => {
                const count = gameState.generators[gen.id] || 0;
                const cost = Math.floor(gen.baseCost * Math.pow(gen.costMultiplier, count));
                
                const item = document.createElement('div');
                item.className = 'shop-item' + (gameState.coins >= cost ? '' : ' disabled');
                item.onclick = () => buyGenerator(gen.id);
                item.innerHTML = `
                    <div class="shop-item-title">${gen.name}</div>
                    <div>产出: ${formatNumber(gen.coinsPerSecond)}/秒</div>
                    <div>拥有: ${count}</div>
                    <div class="shop-item-cost">💰 ${formatNumber(cost)}</div>
                `;
                shop.appendChild(item);
            });
        }
        
        // 检查成就
        function checkAchievements() {
            if (gameState.totalCoins >= 100 && !gameState.achievements.includes('ach1')) {
                gameState.achievements.push('ach1');
                document.getElementById('ach1').classList.add('unlocked');
                showNotification('🎯 成就解锁: 初学者！');
            }
            if (gameState.totalCoins >= 1000000 && !gameState.achievements.includes('ach2')) {
                gameState.achievements.push('ach2');
                document.getElementById('ach2').classList.add('unlocked');
                showNotification('💎 成就解锁: 百万富翁！');
            }
            if (gameState.clicks >= 1000 && !gameState.achievements.includes('ach3')) {
                gameState.achievements.push('ach3');
                document.getElementById('ach3').classList.add('unlocked');
                showNotification('🔫 成就解锁: 点击大师！');
            }
        }
        
        // 显示通知
        function showNotification(text) {
            const notif = document.createElement('div');
            notif.style.cssText = 'position:fixed;top:20px;right:20px;background:#2ecc71;color:white;padding:15px 20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.3);z-index:1000;';
            notif.textContent = text;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }
        
        // 保存游戏
        function saveGame() {
            gameState.lastSave = Date.now();
            localStorage.setItem('idleGame', JSON.stringify(gameState));
            showNotification('💾 游戏已保存！');
        }
        
        // 读取游戏
        function loadGame() {
            const saved = localStorage.getItem('idleGame');
            if (saved) {
                gameState = JSON.parse(saved);
                updateCoinsPerSecond();
                updateDisplay();
                renderShop();
                showNotification('📂 游戏已读取！');
            } else {
                showNotification('❌ 没有保存的进度！');
            }
        }
        
        // 重置游戏
        function resetGame() {
            if (confirm('确定要重置游戏吗？所有进度将丢失！')) {
                gameState = {
                    coins: 0,
                    totalCoins: 0,
                    clicks: 0,
                    coinsPerClick: 1,
                    coinsPerSecond: 0,
                    playTime: 0,
                    lastSave: Date.now(),
                    generators: {},
                    upgrades: {},
                    achievements: []
                };
                updateDisplay();
                renderShop();
                showNotification('🗑️ 游戏已重置！');
            }
        }
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }
        
        // 格式化时间
        function formatTime(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            if (hours > 0) return `${hours}:${String(minutes % 60).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
            return `${minutes}:${String(seconds % 60).padStart(2, '0')}`;
        }
        
        // 初始化
        function init() {
            loadGame();
            renderShop();
            setInterval(gameLoop, 100);
            setInterval(saveGame, 60000); // 自动保存每分钟
            setInterval(() => {
                if (document.hidden) {
                    const now = Date.now();
                    const diff = (now - gameState.lastSave) / 1000;
                    gameState.coins += gameState.coinsPerSecond * diff;
                    gameState.totalCoins += gameState.coinsPerSecond * diff;
                    gameState.lastSave = now;
                    updateDisplay();
                }
            }, 1000);
        }
        
        init();
    </script>
    
    <div style="text-align: center; margin: 40px 0;">
        <a href="../index.html" class="back-link">← 返回首页</a>
    </div>
</body>
</html>
