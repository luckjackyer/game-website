<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射击 - 开心小游戏</title>
    <link rel="stylesheet" href="../css/game.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 3px solid #00ffff;
            background: linear-gradient(to bottom, #000033, #000011);
            box-shadow: 0 0 30px rgba(0,255,255,0.5);
        }
        .info {
            color: #00ffff;
            margin: 20px;
            font-size: 18px;
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            text-decoration: none;
            font-size: 16px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← 返回首页</a>
    
    <div id="gameContainer">
        <h1 style="color: #00ffff; margin-bottom: 20px;">🚀 太空射击</h1>
        <div class="info">
            <span>分数: <span id="score">0</span></span> | 
            <span>生命: <span id="lives">3</span></span> | 
            <span>等级: <span id="level">1</span></span>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <p style="color: #888; margin-top: 20px;">使用 ← → 移动，空格键射击</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameOver = false;
        
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 60,
            width: 50,
            height: 40,
            speed: 5,
            color: '#00ffff'
        };
        
        const bullets = [];
        const enemies = [];
        const keys = {};
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && !gameOver) {
                bullets.push({
                    x: player.x + player.width / 2 - 2.5,
                    y: player.y,
                    width: 5,
                    height: 15,
                    speed: 7
                });
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // 生成敌人
        function spawnEnemy() {
            enemies.push({
                x: Math.random() * (canvas.width - 40),
                y: -40,
                width: 40,
                height: 40,
                speed: 2 + Math.random() * 2,
                color: '#ff00ff'
            });
        }
        
        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // 游戏循环
        function gameLoop() {
            if (gameOver) return;
            
            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 50, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 玩家移动
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
            
            // 绘制玩家
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            // 更新子弹
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                // 绘制子弹
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(bullets[i].x, bullets[i].y, bullets[i].width, bullets[i].height);
            }
            
            // 更新敌人
            if (Math.random() < 0.02 + level * 0.005) {
                spawnEnemy();
            }
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;
                
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    continue;
                }
                
                // 碰撞检测：子弹 vs 敌人
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (checkCollision(bullets[j], enemies[i])) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10 * level;
                        document.getElementById('score').textContent = score;
                        
                        if (score >= level * 100) {
                            level++;
                            document.getElementById('level').textContent = level;
                        }
                        break;
                    }
                }
                
                // 碰撞检测：玩家 vs 敌人
                if (checkCollision(player, enemies[i])) {
                    enemies.splice(i, 1);
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    
                    if (lives <= 0) {
                        gameOver = true;
                        alert(`游戏结束！最终分数: ${score}`);
                    }
                    break;
                }
                
                // 绘制敌人
                if (enemies[i]) {
                    ctx.fillStyle = enemies[i].color;
                    ctx.beginPath();
                    ctx.arc(enemies[i].x + enemies[i].width / 2, enemies[i].y + enemies[i].height / 2, enemies[i].width / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
