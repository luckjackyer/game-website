<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大作战 - 开心小游戏</title>
    <link rel="stylesheet" href="../css/game.css">
    <style>
        body {
            margin:0;
            padding:0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 3px solid #16213e;
            background: #0f3460;
            box-shadow: 0 0 30px rgba(22, 33, 62, 0.8);
        }
        .info {
            color: #e94560;
            margin: 20px;
            font-size: 18px;
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e94560;
            text-decoration: none;
            font-size: 16px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .controls {
            color: #888;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← 返回首页</a>
    
    <div id="gameContainer">
        <h1 style="color: #e94560; margin-bottom: 20px;">🐍 贪吃蛇大作战</h1>
        <div class="info">
            <span>分数: <span id="score">0</span></span> | 
            <span>最高: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="controls">
            📱 使用方向键或WASD控制 | 🎮 移动端支持滑动操作
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        document.getElementById('highScore').textContent = highScore;
        
        let snake = [
            {x: 10, y: 10}
        ];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let gameLoop;
        
        // 触摸控制变量
        let touchStartX = 0;
        let touchStartY = 0;
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && dy === 0) {
                dx = 0; dy = -1;
            }
            if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && dy === 0) {
                dx = 0; dy = 1;
            }
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && dx === 0) {
                dx = -1; dy = 0;
            }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && dx === 0) {
                dx = 1; dy = 0;
            }
        });
        
        // 触摸控制
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (dx > 0 && snake.dx === 0) {
                    snake.dx = 1; snake.dy = 0;
                } else if (dx < 0 && snake.dx === 0) {
                    snake.dx = -1; snake.dy = 0;
                }
            } else {
                // 垂直滑动
                if (dy > 0 && snake.dy === 0) {
                    snake.dx = 0; snake.dy = 1;
                } else if (dy < 0 && snake.dy === 0) {
                    snake.dx = 0; snake.dy = -1;
                }
            }
        });
        
        function drawGame() {
            // 清空画布
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 移动蛇
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 检查碰撞
            if (head.x < 0 || head.x >= tileCount || 
                head.y < 0 || head.y >= tileCount ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
                
                generateFood();
            } else {
                snake.pop();
            }
            
            // 绘制食物
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#00ff88' : '#00cc66';
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
        }
        
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // 确保食物不在蛇身上
            while (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            }
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            alert(`游戏结束！分数: ${score}`);
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            document.getElementById('score').textContent = score;
            generateFood();
            startGame();
        }
        
        function startGame() {
            gameLoop = setInterval(drawGame, 100);
        }
        
        generateFood();
        startGame();
    </script>
</body>
</html>
